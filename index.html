
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Web & Design</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  background:#0a0a0a;
  color:white;
  min-height:200vh;
}

/* HEADER */

.main-header{
  position:fixed;
  top:0;
  width:100%;
  padding:40px 80px; /* Aire premium */
  transition:all .4s ease;
  z-index:1000;
}

.main-header.scrolled{
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 30px rgba(0,0,0,.4);
  padding:25px 80px;
}

.container{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO */

.logo{
  display:flex;
  flex-direction:column;
  cursor:pointer;
  transition:.3s ease;
}

.logo:hover{
  transform:scale(1.03);
}

.mm{
  font-size:42px;
  font-weight:700;
  background:linear-gradient(180deg,#c084fc,#7e22ce);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(168,85,247,.35);
  line-height:1;
}

.tagline{
  font-size:11px;
  letter-spacing:6px;
  color:white;
  margin-top:4px;
}

/* MENU */

.menu a{
  margin-left:50px;
  text-decoration:none;
  color:white;
  font-size:15px;
  position:relative;
  transition:.3s ease;
}

.menu a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  bottom:-6px;
  left:0;
  background:#a855f7;
  transition:.3s ease;
}

.menu a:hover::after{
  width:100%;
}

/* HERO DEMO */

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
  text-align:center;
}

</style>
</head>

<body>

<header class="main-header">
  <div class="container">
    
    <div class="logo">
      <div class="mm">MM</div>
      <div class="tagline">W E B  &  D E S I G N</div>
    </div>

    <nav class="menu">
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Proyectos</a>
      <a href="#">Contacto</a>
    </nav>

  </div>
</header>

<section class="hero">
  Digital Studio Premium
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>

/* Animación entrada */

gsap.from(".logo",{
  y:-50,
  opacity:0,
  duration:1,
  ease:"power3.out"
});

gsap.from(".menu a",{
  y:-40,
  opacity:0,
  duration:1,
  stagger:0.15,
  ease:"power3.out"
});

/* Scroll effect */

window.addEventListener("scroll",function(){
  const header=document.querySelector(".main-header");
  header.classList.toggle("scrolled",window.scrollY>50);
});

</script>

</body>
</html>
